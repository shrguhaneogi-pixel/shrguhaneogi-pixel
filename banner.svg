<svg
  viewBox="0 0 800 200"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-labelledby="banner-title banner-desc"
>
  <title id="banner-title">Portfolio Banner – I'm Shreyas</title>
  <desc id="banner-desc">A Neo-Brutalist portfolio header banner for Shreyas. Bold neon yellow background with a black border and hard drop shadow. The headline reads "I'M SHREYAS" in white with a thick black outline. Below it, a cyan badge reads "OPEN SOURCE B3G1N9R:)". A spinning red plus sign sits in the top-left, and a floating purple circle sits in the bottom-right.</desc>

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bungee&amp;family=Space+Mono:wght@700&amp;display=swap');

      :root {
        --color-yellow : #FAFF00;
        --color-cyan   : #00FFFF;
        --color-red    : #FF1500;
        --color-purple : #CC00FF;
        --color-black  : #080808;
        --color-white  : #FFFFFF;
      }

      /* ── Card shadow ── */
      #shadow {
        fill: var(--color-black);
      }

      /* ── Main card ── */
      #card {
        fill: var(--color-yellow);
        stroke: var(--color-black);
        stroke-width: 4.5;
      }

      /* ── Headline ── */
      .headline {
        font-family: 'Bungee', 'Impact', sans-serif;
        font-size: 72px;
        font-weight: 400;
        letter-spacing: 3px;
        text-anchor: middle;
        dominant-baseline: auto;
      }
      #headline-shadow {
        fill: var(--color-black);
        opacity: 0.5;
      }
      #headline-main {
        fill: var(--color-white);
        stroke: var(--color-black);
        stroke-width: 6px;
        stroke-linejoin: round;
        paint-order: stroke fill;
      }

      /* ── Badge group ── */
      #badge-group {
        cursor: pointer;
        transition: transform 0.15s ease;
      }
      #badge-group:hover {
        transform: translate(-3px, -3px);
      }
      #badge-shadow {
        fill: var(--color-black);
        transition: transform 0.15s ease;
      }
      #badge-group:hover #badge-shadow {
        transform: translate(1px, 1px);
      }
      #badge-rect {
        fill: var(--color-cyan);
        stroke: var(--color-black);
        stroke-width: 3.5;
      }
      #badge-text {
        font-family: 'Space Mono', 'Courier New', monospace;
        font-size: 14.5px;
        font-weight: 700;
        fill: var(--color-black);
        text-anchor: middle;
        dominant-baseline: middle;
        letter-spacing: 1.2px;
        pointer-events: none;
      }

      /* ── Plus sign ── */
      #plus-group {
        animation: spin 9s linear infinite;
        transform-origin: 110px 52px;
      }
      .plus-bar {
        fill: var(--color-red);
        stroke: var(--color-black);
        stroke-width: 2.5;
        stroke-linejoin: round;
        paint-order: stroke fill;
      }

      /* ── Purple circle ── */
      #circle {
        fill: var(--color-purple);
        stroke: var(--color-black);
        stroke-width: 4;
        animation: float 2.8s ease-in-out infinite;
        transform-origin: 724px 145px;
      }

      /* ── Keyframes ── */
      @keyframes spin {
        from { transform: rotate(0deg);   }
        to   { transform: rotate(360deg); }
      }

      @keyframes float {
        0%,100% { transform: translateY(0px);   }
        50%      { transform: translateY(-9px);  }
      }
    </style>
  </defs>

  <!-- ░░ Hard neo-brutalist drop shadow ░░ -->
  <rect id="shadow" x="12" y="12" width="778" height="180" rx="3" ry="3"/>

  <!-- ░░ Main yellow card ░░ -->
  <rect id="card" x="3" y="3" width="778" height="180" rx="3" ry="3"/>

  <!-- ░░ Red plus sign – top-left quadrant ░░ -->
  <g id="plus-group" aria-hidden="true">
    <!-- horizontal -->
    <rect class="plus-bar" x="94"  y="46" width="32" height="12" rx="2"/>
    <!-- vertical -->
    <rect class="plus-bar" x="104" y="36" width="12" height="32" rx="2"/>
  </g>

  <!-- ░░ Headline "I'M SHREYAS" ░░ -->
  <g id="headline-group">
    <!-- offset shadow clone -->
    <text
      id="headline-shadow"
      class="headline"
      x="403" y="107"
      dx="4" dy="4"
      aria-hidden="true"
    >I'M SHREYAS</text>
    <!-- main text -->
    <text
      id="headline-main"
      class="headline"
      x="403" y="107"
    >I'M SHREYAS</text>
  </g>

  <!-- ░░ Cyan subtitle badge ░░ -->
  <g id="badge-group" role="text" aria-label="Open Source Beginner">
    <!-- hard shadow -->
    <rect id="badge-shadow" x="248" y="128" width="270" height="36" rx="3"/>
    <!-- badge face -->
    <rect id="badge-rect"   x="244" y="124" width="270" height="36" rx="3"/>
    <!-- badge label -->
    <text id="badge-text" x="379" y="143">OPEN SOURCE B3G1N9R:)</text>
  </g>

  <!-- ░░ Purple circle – bottom-right quadrant ░░ -->
  <circle id="circle" cx="724" cy="145" r="24" aria-hidden="true"/>

</svg>
